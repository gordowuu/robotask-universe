<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwagScore — Robot Eval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111114;
      --surface2: #18181c;
      --border:   #222228;
      --border2:  #2a2a33;
      --text:     #e8e8f0;
      --muted:    #666674;
      --accent:   #7c6cfc;
      --accent2:  #5a4de0;
      --green:    #3ecf8e;
      --yellow:   #f5c842;
      --red:      #f05252;
      --radius:   10px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; color: #fff; }
    .logo span { color: var(--accent); }
    .session-label {
      font-size: 12px; color: var(--muted);
      padding: 3px 10px; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      height: 3px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      transition: width 0.4s ease;
    }

    /* ── Main layout ── */
    .app-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      gap: 24px;
    }

    /* ── Video panel ── */
    .video-panel { display: flex; flex-direction: column; gap: 16px; }

    .video-wrapper {
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
    }
    .video-wrapper video {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .video-overlay-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ccc;
      backdrop-filter: blur(6px);
    }
    .video-num-badge {
      position: absolute; top: 10px; right: 10px;
      background: rgba(124,108,252,0.3);
      border: 1px solid rgba(124,108,252,0.4);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #c4b8ff;
      backdrop-filter: blur(6px);
    }

    .video-meta {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .video-meta h2 { font-size: 15px; font-weight: 600; color: #fff; }
    .video-meta p  { font-size: 12px; color: var(--muted); }

    /* ── Playback controls mini-bar ── */
    .playback-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .pb-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 5px 11px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pb-btn:hover { background: #252530; }
    .pb-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .speed-group { display: flex; gap: 3px; }
    .pb-spacer { flex: 1; }
    .pb-time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Rating panel ── */
    .rating-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    .panel-card h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Sliders ── */
    .dim-row {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }
    .dim-row:last-child { margin-bottom: 0; }

    .dim-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .dim-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dim-icon { font-size: 14px; }
    .dim-desc { font-size: 11px; color: var(--muted); margin-top: -3px; }

    .dim-score-badge {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
      transition: color 0.2s;
    }

    .dim-slider-wrap { position: relative; }
    input[type=range].dim-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      background: var(--border2);
    }
    input[type=range].dim-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range].dim-slider:hover::-webkit-slider-thumb { transform: scale(1.2); }
    input[type=range].dim-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }

    .dim-ticks {
      display: flex;
      justify-content: space-between;
      padding: 2px 1px 0;
    }
    .dim-tick { font-size: 10px; color: #444; }

    /* ── Notes ── */
    textarea.notes-field {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea.notes-field:focus { border-color: var(--accent); }
    textarea.notes-field::placeholder { color: var(--muted); }

    /* ── Action buttons ── */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
    }
    .btn-secondary:hover { background: #252530; }

    /* ── Score summary mini ── */
    .aggregate-preview {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .agg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .agg-dim { font-size: 12px; color: var(--muted); min-width: 130px; }
    .agg-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden;
    }
    .agg-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .agg-val { font-size: 12px; font-weight: 600; min-width: 26px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Results modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      width: 100%;
      max-width: 780px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      width: 32px; height: 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #2a2a38; }

    /* Results table */
    .results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .results-table th {
      text-align: left; padding: 8px 10px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .results-table td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .results-table tr:last-child td { border-bottom: none; }
    .results-table tr:hover td { background: var(--surface2); }

    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 22px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
    }

    .modal-section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 20px 0 12px;
    }

    /* Radar chart placeholder — CSS-only visual */
    .dim-avg-bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dim-avg-row {
      display: grid;
      grid-template-columns: 140px 1fr 40px;
      align-items: center;
      gap: 10px;
    }
    .dim-avg-label { font-size: 13px; color: var(--text); }
    .dim-avg-bar-bg {
      height: 8px;
      background: var(--border2);
      border-radius: 4px;
      overflow: hidden;
    }
    .dim-avg-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .dim-avg-val { font-size: 13px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      z-index: 200;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Done state ── */
    .done-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 12px;
      text-align: center;
    }
    .done-emoji { font-size: 48px; }
    .done-panel h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .done-panel p { font-size: 14px; color: var(--muted); }

    /* ── Keyboard hint ── */
    .kbd-hint {
      font-size: 11px;
      color: #444;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .kbd { background: #1a1a22; border: 1px solid #2a2a38; border-radius: 4px; padding: 1px 6px; font-size: 10px; color: #666; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .app-body { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      header { padding: 10px 16px; }
      .app-body { padding: 14px; gap: 14px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">Swag<span>Score</span></div>
  <span class="session-label" id="session-label">Session loading…</span>
  <div class="header-right">
    <button class="pb-btn" onclick="openResults()">📊 Results</button>
    <button class="pb-btn" onclick="exportCSV()">⬇ Export CSV</button>
  </div>
</header>

<!-- Progress bar -->
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- ── App body ── -->
<div class="app-body">

  <!-- Left: video + playback -->
  <div class="video-panel">
    <div class="video-wrapper">
      <video id="main-video" playsinline loop></video>
      <div class="video-overlay-badge" id="vid-type-badge">ORIGINAL</div>
      <div class="video-num-badge" id="vid-num-badge">1 / 4</div>
    </div>

    <!-- Playback bar -->
    <div class="playback-bar">
      <button class="pb-btn" onclick="togglePlay()" id="play-btn">▶ Play</button>
      <div class="speed-group">
        <button class="pb-btn speed-btn" onclick="setSpeed(0.25)">¼×</button>
        <button class="pb-btn speed-btn" onclick="setSpeed(0.5)">½×</button>
        <button class="pb-btn speed-btn active" onclick="setSpeed(1)">1×</button>
        <button class="pb-btn speed-btn" onclick="setSpeed(2)">2×</button>
      </div>
      <div class="pb-spacer"></div>
      <span class="pb-time" id="vid-time">0:00 / 0:00</span>
    </div>

    <!-- Video meta -->
    <div class="video-meta">
      <h2 id="vid-label">Loading…</h2>
      <p id="vid-task">—</p>
    </div>

    <!-- Aggregate scores (live update) -->
    <div class="panel-card" id="agg-card" style="display:none">
      <h3>Session Averages</h3>
      <div class="aggregate-preview" id="agg-preview"></div>
    </div>
  </div>

  <!-- Right: rating panel -->
  <div class="rating-panel" id="rating-panel">
    <div class="panel-card">
      <h3>Rate This Video</h3>
      <div id="sliders-container"></div>
    </div>

    <div class="panel-card">
      <h3>Notes <span style="font-size:10px;color:#555;text-transform:none;font-weight:400;">(optional)</span></h3>
      <textarea class="notes-field" id="notes-field" placeholder="Any observations about this video…"></textarea>
    </div>

    <div class="action-row">
      <button class="btn btn-secondary" onclick="skipVideo()">Skip</button>
      <button class="btn btn-primary" onclick="submitRating()" id="submit-btn">
        Submit &amp; Next →
      </button>
    </div>

    <div class="kbd-hint" id="kbd-hint">
      <span class="kbd">Space</span> play/pause
      <span class="kbd">R</span> restart
      <span class="kbd">Tab</span> next slider
      <span class="kbd">Enter</span> submit
    </div>

    <!-- Done state injected here -->
  </div>

</div>

<!-- ── Results Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeResultsIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>📊 Eval Results</h2>
      <button class="modal-close" onclick="closeResults()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     CONFIGURATION — edit this section to set up your eval
     ═══════════════════════════════════════════════════════════ -->
<script>
  const SESSION_NAME  = 'my-eval-session';   // CHANGE: session identifier
  const EVALUATOR     = 'evaluator-1';        // CHANGE: who is rating

  // Videos to evaluate — add/remove entries freely
  // file: path/URL to video; label: display name; task: description
  // Replace with your own video URLs
  const VIDEOS = [
    { file: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4',                    label: 'Original Demo',     task: 'Pick and place — baseline', type: 'original'  },
    { file: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4',    label: 'Cosmos Gen v1',     task: 'Pick and place — aug run 1', type: 'generated' },
    { file: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/VolkswagenGTIReview.mp4',             label: 'Cosmos Gen v2',     task: 'Pick and place — aug run 2', type: 'generated' },
    { file: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WeAreGoingOnBullrun.mp4',             label: 'Cosmos Gen v3',     task: 'Pick and place — aug run 3', type: 'generated' },
  ];

  // Rating dimensions — name, emoji, description, weight (for aggregate)
  const DIMENSIONS = [
    { id: 'smoothness',   name: 'Smoothness',       icon: '〰️',  desc: 'Motion fluidity — no jitter or abrupt stops',       weight: 1 },
    { id: 'completion',   name: 'Task Completion',  icon: '✅',  desc: 'Did the robot actually complete the task goal?',     weight: 2 },
    { id: 'naturalness',  name: 'Naturalness',      icon: '🤖',  desc: 'Does the motion look physically plausible?',         weight: 1 },
    { id: 'speed',        name: 'Speed',            icon: '⚡',  desc: 'Appropriate speed — not too fast or too slow',       weight: 1 },
    { id: 'recovery',     name: 'Recovery',         icon: '🔄',  desc: 'How well did it handle errors or uncertainty?',      weight: 1 },
  ];

  const SCALE_MAX = 10;  // 1–10 rating scale
</script>
<!-- ═══════════════════════════════════════════════════════════ -->

<script>
  // ── State ──
  const STORAGE_KEY = `swag-score:${SESSION_NAME}`;
  let ratings   = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let curIndex  = 0;
  let curSpeed  = 1;
  let curSlider = 0; // for Tab navigation

  // ── DOM refs ──
  const video      = document.getElementById('main-video');
  const playBtn    = document.getElementById('play-btn');
  const vidTime    = document.getElementById('vid-time');
  const vidLabel   = document.getElementById('vid-label');
  const vidTask    = document.getElementById('vid-task');
  const vidNumBadge= document.getElementById('vid-num-badge');
  const vidTypeBadge=document.getElementById('vid-type-badge');
  const progressFill=document.getElementById('progress-fill');
  const sessionLabel=document.getElementById('session-label');
  const notesField = document.getElementById('notes-field');
  const aggCard    = document.getElementById('agg-card');
  const aggPreview = document.getElementById('agg-preview');

  // ── Init session label ──
  sessionLabel.textContent = `${SESSION_NAME} · ${EVALUATOR}`;

  // ── Build sliders ──
  const slidersContainer = document.getElementById('sliders-container');
  DIMENSIONS.forEach((dim, i) => {
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-header">
        <div>
          <div class="dim-name"><span class="dim-icon">${dim.icon}</span>${dim.name}</div>
          <div class="dim-desc">${dim.desc}</div>
        </div>
        <div class="dim-score-badge" id="badge-${dim.id}">5</div>
      </div>
      <div class="dim-slider-wrap">
        <input type="range" class="dim-slider" id="slider-${dim.id}"
          min="1" max="${SCALE_MAX}" step="1" value="5"
          data-dim="${dim.id}" data-idx="${i}">
      </div>
      <div class="dim-ticks">
        ${Array.from({length: SCALE_MAX}, (_,k)=>`<span class="dim-tick">${k+1}</span>`).join('')}
      </div>
    `;
    slidersContainer.appendChild(row);
  });

  // ── Slider live updates ──
  document.querySelectorAll('.dim-slider').forEach(slider => {
    const id = slider.dataset.dim;
    const badge = document.getElementById(`badge-${id}`);
    function updateBadge() {
      const v = parseInt(slider.value);
      badge.textContent = v;
      const pct = (v - 1) / (SCALE_MAX - 1);
      // Color: red(1) → yellow(5) → green(10)
      badge.style.color = scoreColor(pct);
      // Fill the track
      const fillPct = ((v - 1) / (SCALE_MAX - 1) * 100).toFixed(1) + '%';
      slider.style.background = `linear-gradient(to right, ${scoreColor(pct)} 0%, ${scoreColor(pct)} ${fillPct}, var(--border2) ${fillPct}, var(--border2) 100%)`;
    }
    slider.addEventListener('input', updateBadge);
    updateBadge(); // init
  });

  function scoreColor(pct) {
    // 0→red, 0.5→yellow, 1→green
    if (pct < 0.5) {
      const r = 240, g = Math.round(pct * 2 * 200) + 52, b = 52;
      return `rgb(${r},${g},${b})`;
    } else {
      const r = Math.round((1 - (pct - 0.5) * 2) * 240), g = 207, b = Math.round((pct - 0.5) * 2 * 20) + 62;
      return `rgb(${r},${g},${b})`;
    }
  }

  function colorForScore(score) {
    return scoreColor((score - 1) / (SCALE_MAX - 1));
  }

  // ── Load video ──
  function loadVideo(index) {
    if (index >= VIDEOS.length) { showDoneState(); return; }
    const v = VIDEOS[index];
    video.src = v.file;
    video.load();
    video.play().catch(() => {});
    video.playbackRate = curSpeed;
    vidLabel.textContent = v.label;
    vidTask.textContent  = v.task;
    vidTypeBadge.textContent = (v.type || 'video').toUpperCase();
    vidNumBadge.textContent = `${index + 1} / ${VIDEOS.length}`;
    progressFill.style.width = (index / VIDEOS.length * 100) + '%';
    // Reset sliders
    document.querySelectorAll('.dim-slider').forEach(s => {
      s.value = 5;
      s.dispatchEvent(new Event('input'));
    });
    notesField.value = '';
    curSlider = 0;
    document.querySelectorAll('.dim-slider')[0]?.focus();
  }

  // Find first unrated video
  const ratedFiles = new Set(ratings.map(r => r.file));
  while (curIndex < VIDEOS.length && ratedFiles.has(VIDEOS[curIndex].file)) curIndex++;
  loadVideo(curIndex);

  // ── Time display ──
  setInterval(() => {
    if (!video.duration) return;
    const fmtTime = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    vidTime.textContent = `${fmtTime(video.currentTime)} / ${fmtTime(video.duration)}`;
  }, 200);

  video.addEventListener('play',  () => { playBtn.textContent = '⏸ Pause'; });
  video.addEventListener('pause', () => { playBtn.textContent = '▶ Play'; });

  // ── Playback controls ──
  function togglePlay() {
    if (video.paused) video.play(); else video.pause();
  }

  const speedBtns = document.querySelectorAll('.speed-btn');
  const speedVals = [0.25, 0.5, 1, 2];
  function setSpeed(s) {
    curSpeed = s;
    video.playbackRate = s;
    speedBtns.forEach((b, i) => b.classList.toggle('active', speedVals[i] === s));
  }

  // ── Submit ──
  function submitRating() {
    if (curIndex >= VIDEOS.length) return;
    const v = VIDEOS[curIndex];
    const scores = {};
    DIMENSIONS.forEach(dim => {
      scores[dim.id] = parseInt(document.getElementById(`slider-${dim.id}`).value);
    });
    const totalWeight = DIMENSIONS.reduce((a, d) => a + d.weight, 0);
    const weightedSum = DIMENSIONS.reduce((a, d) => a + scores[d.id] * d.weight, 0);
    const aggregate = (weightedSum / totalWeight).toFixed(2);

    const entry = {
      session: SESSION_NAME,
      evaluator: EVALUATOR,
      file: v.file,
      label: v.label,
      task: v.task,
      ...scores,
      aggregate,
      notes: notesField.value.trim(),
      timestamp: new Date().toISOString(),
    };
    ratings.push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings));
    showToast(`✓ Rated "${v.label}" — score ${aggregate}/10`);
    updateAggregatePreview();
    curIndex++;
    loadVideo(curIndex);
  }

  function skipVideo() {
    showToast('Skipped — moving on');
    curIndex++;
    loadVideo(curIndex);
  }

  // ── Aggregate preview ──
  function updateAggregatePreview() {
    if (ratings.length === 0) { aggCard.style.display = 'none'; return; }
    aggCard.style.display = '';
    aggPreview.innerHTML = '';
    DIMENSIONS.forEach(dim => {
      const avg = ratings.reduce((a, r) => a + (r[dim.id] || 0), 0) / ratings.length;
      const pct = ((avg - 1) / (SCALE_MAX - 1) * 100).toFixed(1);
      const color = colorForScore(avg);
      const row = document.createElement('div');
      row.className = 'agg-row';
      row.innerHTML = `
        <span class="agg-dim">${dim.icon} ${dim.name}</span>
        <div class="agg-bar-wrap"><div class="agg-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="agg-val" style="color:${color}">${avg.toFixed(1)}</span>
      `;
      aggPreview.appendChild(row);
    });
  }
  updateAggregatePreview();

  // ── Done state ──
  function showDoneState() {
    document.getElementById('rating-panel').innerHTML = `
      <div class="done-panel panel-card">
        <div class="done-emoji">🎉</div>
        <h2>All videos rated!</h2>
        <p>${ratings.length} ratings saved. Session: <strong>${SESSION_NAME}</strong></p>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary" onclick="openResults()">📊 View Results</button>
          <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
        </div>
      </div>
    `;
    progressFill.style.width = '100%';
  }

  // ── Results modal ──
  function openResults() {
    const overlay = document.getElementById('modal-overlay');
    const body    = document.getElementById('modal-body');
    if (ratings.length === 0) { showToast('No ratings yet!'); return; }

    // Per-dimension averages
    const avgs = {};
    DIMENSIONS.forEach(dim => {
      avgs[dim.id] = ratings.reduce((a, r) => a + (r[dim.id] || 0), 0) / ratings.length;
    });

    // Average bars section
    let avgBarsHTML = `<div class="modal-section-title">Dimension Averages (n=${ratings.length})</div><div class="dim-avg-bars">`;
    DIMENSIONS.forEach(dim => {
      const avg = avgs[dim.id];
      const pct = ((avg - 1) / (SCALE_MAX - 1) * 100).toFixed(1);
      const color = colorForScore(avg);
      avgBarsHTML += `
        <div class="dim-avg-row">
          <span class="dim-avg-label">${dim.icon} ${dim.name}</span>
          <div class="dim-avg-bar-bg"><div class="dim-avg-bar" style="width:${pct}%;background:${color}"></div></div>
          <span class="dim-avg-val" style="color:${color}">${avg.toFixed(2)}</span>
        </div>`;
    });
    avgBarsHTML += '</div>';

    // Table
    const dimCols = DIMENSIONS.map(d => `<th>${d.icon} ${d.name}</th>`).join('');
    const rows = ratings.map(r => {
      const dimCells = DIMENSIONS.map(d => {
        const s = r[d.id] || 0;
        const c = colorForScore(s);
        return `<td><span class="score-pill" style="background:${c}22;color:${c}">${s}</span></td>`;
      }).join('');
      const aggColor = colorForScore(parseFloat(r.aggregate));
      return `<tr>
        <td style="font-weight:600;color:#fff">${r.label}</td>
        <td style="font-size:11px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.task}</td>
        ${dimCells}
        <td><span class="score-pill" style="background:${aggColor}33;color:${aggColor};font-size:13px;width:40px">${r.aggregate}</span></td>
        <td style="font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.notes || '—'}</td>
      </tr>`;
    }).join('');

    body.innerHTML = `
      ${avgBarsHTML}
      <div class="modal-section-title" style="margin-top:24px">Per-Video Scores</div>
      <div style="overflow-x:auto">
        <table class="results-table">
          <thead><tr>
            <th>Video</th><th>Task</th>${dimCols}<th>Aggregate</th><th>Notes</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:20px;display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:none;padding:9px 20px" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn btn-secondary" style="flex:none;padding:9px 20px" onclick="clearData()">🗑 Clear All</button>
      </div>
    `;
    overlay.classList.add('open');
    // Animate bars after render
    setTimeout(() => body.querySelectorAll('.dim-avg-bar,.agg-bar-fill').forEach(b => b.style.transition = 'width 0.6s ease'), 50);
  }

  function closeResults() { document.getElementById('modal-overlay').classList.remove('open'); }
  function closeResultsIfBg(e) { if (e.target === document.getElementById('modal-overlay')) closeResults(); }

  // ── CSV export ──
  function exportCSV() {
    if (ratings.length === 0) { showToast('Nothing to export yet!'); return; }
    const dimIds = DIMENSIONS.map(d => d.id);
    const header = ['session','evaluator','file','label','task', ...dimIds, 'aggregate','notes','timestamp'];
    const rows = ratings.map(r => header.map(k => JSON.stringify(r[k] ?? '')).join(','));
    const csv = [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `${SESSION_NAME}-ratings.csv`; a.click();
    URL.revokeObjectURL(url);
    showToast(`Exported ${ratings.length} rows`);
  }

  // ── Clear data ──
  function clearData() {
    if (!confirm(`Delete all ${ratings.length} ratings for session "${SESSION_NAME}"?`)) return;
    ratings = [];
    localStorage.removeItem(STORAGE_KEY);
    closeResults();
    curIndex = 0;
    loadVideo(0);
    updateAggregatePreview();
    showToast('All ratings cleared');
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA') return;
    const sliders = document.querySelectorAll('.dim-slider');
    switch (e.key) {
      case ' ':
        e.preventDefault();
        togglePlay();
        break;
      case 'r': case 'R':
        video.currentTime = 0;
        video.play();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        video.currentTime = Math.max(0, video.currentTime - 5);
        break;
      case 'ArrowRight':
        e.preventDefault();
        video.currentTime = Math.min(video.duration || 999, video.currentTime + 5);
        break;
      case 'Tab':
        if (sliders.length > 0) {
          e.preventDefault();
          curSlider = (curSlider + (e.shiftKey ? -1 : 1) + sliders.length) % sliders.length;
          sliders[curSlider].focus();
        }
        break;
      case 'Enter':
        submitRating();
        break;
      case 's': case 'S':
        skipVideo();
        break;
    }
  });
</script>
</body>
</html>

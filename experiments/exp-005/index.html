<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataAugGallery — Robot Dataset Comparison</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #080810;
      --surf:   #0e0e1a;
      --surf2:  #14141f;
      --surf3:  #1a1a28;
      --border: #1e1e32;
      --brd2:   #262640;
      --text:   #e0e0f0;
      --muted:  #56566e;
      --dim:    #36364e;
      --accent: #7c6cfc;
      --acc2:   #5a4de0;
      --green:  #22c55e;
      --amber:  #f59e0b;
      --cyan:   #22d3ee;
      --pink:   #e879f9;
      --r:      10px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: rgba(8,8,16,0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 40;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 17px; font-weight: 800; letter-spacing: -0.02em; color: #fff;
    }
    .logo span { color: var(--accent); }
    .header-spacer { flex: 1; }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .filter-chip {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--brd2);
      background: var(--surf2);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.14s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--dim); color: var(--text); }
    .filter-chip.active {
      background: rgba(124,108,252,0.15);
      border-color: var(--accent);
      color: #c4b5fd;
    }
    .filter-chip[data-tag=original].active  { background: rgba(34,211,238,0.1); border-color: var(--cyan); color: #67e8f9; }
    .filter-chip[data-tag=cosmos].active    { background: rgba(124,108,252,0.15); border-color: var(--accent); color: #c4b5fd; }
    .filter-chip[data-tag=great].active     { background: rgba(34,197,94,0.1); border-color: var(--green); color: #86efac; }
    .filter-chip[data-tag=check].active     { background: rgba(245,158,11,0.1); border-color: var(--amber); color: #fcd34d; }
    .filter-chip[data-tag=bad].active       { background: rgba(239,68,68,0.1); border-color: #ef4444; color: #fca5a5; }

    .toolbar-spacer { flex: 1; }
    .view-toggle { display: flex; gap: 2px; }
    .view-btn {
      padding: 5px 10px;
      background: var(--surf2); border: 1px solid var(--brd2);
      color: var(--muted); border-radius: 6px;
      font-size: 13px; cursor: pointer; transition: all 0.12s;
    }
    .view-btn.active { background: var(--surf3); border-color: var(--dim); color: var(--text); }
    .sort-select {
      background: var(--surf2); border: 1px solid var(--brd2);
      color: var(--text); font-size: 12px; padding: 4px 10px;
      border-radius: 6px; outline: none; cursor: pointer;
    }
    .count-badge {
      font-size: 11px; color: var(--muted);
      padding: 2px 8px; background: var(--surf2);
      border: 1px solid var(--border); border-radius: 20px;
    }

    /* ── Main content ── */
    .content { padding: 20px 24px; }

    /* ── Group headers ── */
    .group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; margin-top: 24px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .group-header:first-child { margin-top: 0; }
    .group-title { font-size: 14px; font-weight: 700; color: #fff; }
    .group-task { font-size: 12px; color: var(--muted); }
    .group-count { font-size: 11px; color: var(--muted); padding: 2px 7px; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; margin-left: auto; }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }
    .card-grid.list-view {
      grid-template-columns: 1fr;
    }

    /* ── Video card ── */
    .vid-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }
    .vid-card:hover { border-color: var(--brd2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .vid-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

    /* Thumbnail (canvas-generated) */
    .card-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    .card-thumb video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .card-thumb canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    .thumb-play-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3);
      opacity: 0; transition: opacity 0.15s;
    }
    .vid-card:hover .thumb-play-icon { opacity: 1; }
    .thumb-play-icon span { font-size: 32px; filter: drop-shadow(0 0 8px rgba(0,0,0,0.5)); }

    /* Tag badges on thumbnail */
    .thumb-tags {
      position: absolute; top: 6px; left: 6px;
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .thumb-tag {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 6px; border-radius: 4px;
    }
    .thumb-tag.original { background: rgba(34,211,238,0.25); color: #67e8f9; border: 1px solid rgba(34,211,238,0.3); }
    .thumb-tag.cosmos   { background: rgba(124,108,252,0.25); color: #c4b5fd; border: 1px solid rgba(124,108,252,0.3); }
    .thumb-tag.great    { background: rgba(34,197,94,0.25); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
    .thumb-tag.check    { background: rgba(245,158,11,0.25); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .thumb-tag.bad      { background: rgba(239,68,68,0.25); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

    /* Star rating on thumb */
    .thumb-score {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7); border-radius: 5px;
      padding: 2px 6px; font-size: 11px; font-weight: 700;
      display: none;
    }

    /* Card body */
    .card-body { padding: 10px 12px; }
    .card-label { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .card-task  { font-size: 11px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-meta { display: flex; align-items: center; justify-content: space-between; }
    .card-dur { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .card-actions { display: flex; gap: 4px; }
    .card-action-btn {
      background: transparent; border: 1px solid var(--brd2);
      color: var(--muted); padding: 2px 8px;
      border-radius: 5px; font-size: 11px; cursor: pointer;
      transition: all 0.12s;
    }
    .card-action-btn:hover { color: var(--text); border-color: var(--dim); }
    .card-action-btn.tagged { color: var(--amber); border-color: rgba(245,158,11,0.3); }

    /* ── List view card ── */
    .card-grid.list-view .vid-card { display: flex; flex-direction: row; }
    .card-grid.list-view .card-thumb { width: 180px; flex-shrink: 0; aspect-ratio: unset; height: 100px; }
    .card-grid.list-view .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox-inner {
      width: 100%; max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      transform: scale(0.96);
      transition: transform 0.2s;
    }
    .lightbox.open .lightbox-inner { transform: scale(1); }

    .lb-video-wrap {
      background: #000; border-radius: 12px; overflow: hidden;
      aspect-ratio: 16/9; position: relative;
    }
    .lb-video-wrap video { width: 100%; height: 100%; object-fit: contain; }

    .lb-panel {
      background: var(--surf);
      border: 1px solid var(--brd2);
      border-radius: 12px;
      padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto;
      max-height: 80vh;
    }
    .lb-title { font-size: 18px; font-weight: 700; color: #fff; }
    .lb-task  { font-size: 13px; color: var(--muted); }

    .lb-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }

    .lb-scrubber { display: flex; align-items: center; gap: 8px; }
    .lb-scr-t { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 30px; }
    input[type=range]#lb-scrubber {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; background: var(--brd2);
      outline: none; cursor: pointer;
    }
    input[type=range]#lb-scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg); cursor: pointer;
    }

    .lb-controls { display: flex; gap: 6px; flex-wrap: wrap; }
    .lb-btn {
      background: var(--surf2); border: 1px solid var(--brd2);
      color: var(--text); padding: 5px 12px;
      border-radius: 7px; font-size: 12px; cursor: pointer;
      transition: background 0.12s;
    }
    .lb-btn:hover { background: var(--surf3); }
    .lb-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .lb-tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .lb-tag-btn {
      padding: 5px 11px; border-radius: 20px;
      border: 1px solid var(--brd2); background: var(--surf2);
      font-size: 12px; cursor: pointer; color: var(--muted);
      transition: all 0.14s;
    }
    .lb-tag-btn:hover { color: var(--text); }
    .lb-tag-btn.active-tag { border-color: var(--amber); background: rgba(245,158,11,0.12); color: #fcd34d; }

    .lb-close {
      position: fixed; top: 20px; right: 24px;
      background: var(--surf2); border: 1px solid var(--brd2);
      color: var(--text); width: 36px; height: 36px;
      border-radius: 8px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 110;
    }
    .lb-close:hover { background: var(--surf3); }

    .lb-nav { display: flex; gap: 8px; margin-top: auto; }
    .lb-nav-btn {
      flex: 1; padding: 8px; background: var(--surf2);
      border: 1px solid var(--brd2); color: var(--text);
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.12s;
    }
    .lb-nav-btn:hover { background: var(--surf3); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surf2); border: 1px solid rgba(124,108,252,0.4);
      border-radius: 10px; padding: 10px 16px; font-size: 13px;
      z-index: 300; opacity: 0; transform: translateY(8px);
      transition: all 0.2s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 800px) {
      .toolbar { padding: 10px 14px; }
      .content { padding: 14px; }
      .lightbox-inner { grid-template-columns: 1fr; }
      .lb-panel { max-height: 50vh; }
    }
  </style>
</head>

<script>
// ── State ──
const TAGS_KEY = 'data-aug-gallery:tags';
let userTags = JSON.parse(localStorage.getItem(TAGS_KEY) || '{}'); // key: file → { tags:[], notes:'' }
let activeFilter = 'all';
let activeView   = 'grid';
let lbIndex = 0;  // current lightbox item index (into flat allVideos)
let lbSpeed = 1;
let lbScrubDrag = false;

// Flatten all videos with group info
let allVideos = [];
DATASET.forEach(g => {
  g.videos.forEach(v => {
    allVideos.push({ ...v, group: g.group, task: v.task || g.task });
  });
});

// Extract poster frames via canvas
const posterCache = {}; // file → dataURL
function extractPoster(videoEl, file) {
  return new Promise(resolve => {
    if (posterCache[file]) { resolve(posterCache[file]); return; }
    videoEl.currentTime = 0.5;
    videoEl.addEventListener('seeked', function handler() {
      videoEl.removeEventListener('seeked', handler);
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 320; canvas.height = 180;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoEl, 0, 0, 320, 180);
        const url = canvas.toDataURL('image/jpeg', 0.7);
        posterCache[file] = url;
        resolve(url);
      } catch { resolve(null); }
    }, { once: true });
  });
}

// ── Filter state ──
function setFilter(tag, el) {
  activeFilter = tag;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGallery();
}

function setView(v) {
  activeView = v;
  document.getElementById('vbtn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('vbtn-list').classList.toggle('active', v === 'list');
  renderGallery();
}

// ── Render gallery ──
function getFileTags(file) { return userTags[file] || { tags: [], notes: '' }; }
function hasTag(file, tag) { return getFileTags(file).tags.includes(tag); }

function passesFilter(vid) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'original' || activeFilter === 'cosmos') return vid.type === activeFilter;
  return hasTag(vid.file, activeFilter);
}

function renderGallery() {
  const root = document.getElementById('gallery-root');
  root.innerHTML = '';
  const sort = document.getElementById('sort-select').value;

  // Group by group name
  const groups = {};
  DATASET.forEach(g => { groups[g.group] = g; });

  let visibleCount = 0;

  Object.entries(groups).forEach(([groupName, groupData]) => {
    let vids = groupData.videos.map(v => ({ ...v, group: groupName, task: v.task || groupData.task }));

    // Sort
    if (sort === 'label') vids.sort((a,b) => a.label.localeCompare(b.label));
    if (sort === 'type')  vids.sort((a,b) => a.type.localeCompare(b.type));

    // Filter
    const visible = vids.filter(passesFilter);
    if (visible.length === 0) return;

    visibleCount += visible.length;

    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `
      <div class="group-title">${groupName}</div>
      <div class="group-task">${groupData.task}</div>
      <div class="group-count">${visible.length} video${visible.length!==1?'s':''}</div>
    `;
    root.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = `card-grid${activeView === 'list' ? ' list-view' : ''}`;
    root.appendChild(grid);

    visible.forEach(vid => {
      const card = buildCard(vid);
      grid.appendChild(card);
    });
  });

  document.getElementById('count-badge').textContent = `${visibleCount} item${visibleCount!==1?'s':''}`;

  if (visibleCount === 0) {
    root.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><div>No videos match the current filter.</div></div>`;
  }

  // Lazy-load poster frames
  requestIdleCallback(() => loadPosters());
}

function buildCard(vid) {
  const tags = getFileTags(vid.file);
  const tagBadges = [vid.type, ...tags.tags.filter(t => ['great','check','bad'].includes(t))]
    .map(t => `<span class="thumb-tag ${t}">${t}</span>`).join('');

  const card = document.createElement('div');
  card.className = `vid-card`;
  card.dataset.file = vid.file;
  card.innerHTML = `
    <div class="card-thumb" id="thumb-${vid.file.replace(/[^a-z0-9]/gi,'_')}">
      <video src="${vid.file}" preload="metadata" muted playsinline style="opacity:0"></video>
      <canvas></canvas>
      <div class="thumb-play-icon"><span>▶</span></div>
      <div class="thumb-tags">${tagBadges}</div>
    </div>
    <div class="card-body">
      <div class="card-label">${vid.label}</div>
      <div class="card-task">${vid.augmentation || vid.task || ''}</div>
      <div class="card-meta">
        <span class="card-dur" id="dur-${vid.file.replace(/[^a-z0-9]/gi,'_')}">—</span>
        <div class="card-actions">
          <button class="card-action-btn${hasTag(vid.file,'great')?' tagged':''}" onclick="event.stopPropagation();quickTag('${vid.file}','great',this)">✅</button>
          <button class="card-action-btn${hasTag(vid.file,'check')?' tagged':''}" onclick="event.stopPropagation();quickTag('${vid.file}','check',this)">⚠️</button>
          <button class="card-action-btn${hasTag(vid.file,'bad')?' tagged':''}" onclick="event.stopPropagation();quickTag('${vid.file}','bad',this)">❌</button>
        </div>
      </div>
    </div>
  `;

  // Find global index
  const globalIdx = allVideos.findIndex(v => v.file === vid.file);
  card.onclick = () => openLightbox(globalIdx >= 0 ? globalIdx : 0);
  return card;
}

// ── Poster frame extraction ──
function loadPosters() {
  document.querySelectorAll('.card-thumb').forEach(thumb => {
    const vid = thumb.querySelector('video');
    const canvas = thumb.querySelector('canvas');
    if (!vid || !canvas) return;

    vid.addEventListener('loadeddata', async function handler() {
      vid.removeEventListener('loadeddata', handler);
      const dur = vid.duration;
      const durId = `dur-${vid.src.split('/').pop().replace(/[^a-z0-9]/gi,'_')}`;
      const durEl = document.getElementById(durId);
      if (durEl && dur) {
        durEl.textContent = `${Math.floor(dur/60)}:${Math.floor(dur%60).toString().padStart(2,'0')}`;
      }
      try {
        vid.currentTime = Math.min(1, dur * 0.1);
      } catch {}
    });

    vid.addEventListener('seeked', function handler() {
      vid.removeEventListener('seeked', handler);
      try {
        canvas.width = vid.videoWidth || 320;
        canvas.height = vid.videoHeight || 180;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
        vid.style.opacity = '0';
      } catch {}
    }, { once: true });
  });
}

// ── Quick tag ──
function quickTag(file, tag, btn) {
  const state = getFileTags(file);
  const idx = state.tags.indexOf(tag);
  if (idx >= 0) { state.tags.splice(idx, 1); btn.classList.remove('tagged'); }
  else          { state.tags.push(tag);       btn.classList.add('tagged'); }
  userTags[file] = state;
  localStorage.setItem(TAGS_KEY, JSON.stringify(userTags));
  // Re-render tag badges on thumbnail
  const safeFile = file.replace(/[^a-z0-9]/gi,'_');
  const thumb = document.getElementById(`thumb-${safeFile}`);
  if (thumb) {
    const tagWrap = thumb.querySelector('.thumb-tags');
    const vid = allVideos.find(v => v.file === file);
    if (tagWrap && vid) {
      tagWrap.innerHTML = [vid.type, ...state.tags.filter(t=>['great','check','bad'].includes(t))]
        .map(t => `<span class="thumb-tag ${t}">${t}</span>`).join('');
    }
  }
  showToast(`Tag "${tag}" ${idx>=0?'removed':'added'} for ${file}`);
}

// ── Lightbox ──
function fmtT(s) { return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

function openLightbox(idx) {
  lbIndex = idx;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  const v = document.getElementById('lb-video');
  if (v) v.pause();
}

function lbNav(dir) {
  lbIndex = (lbIndex + dir + allVideos.length) % allVideos.length;
  renderLightbox();
}

function renderLightbox() {
  const vid = allVideos[lbIndex];
  if (!vid) return;
  const lbVid = document.getElementById('lb-video');
  lbVid.src = vid.file;
  lbVid.playbackRate = lbSpeed;
  lbVid.play().catch(()=>{});

  document.getElementById('lb-title').textContent = vid.label;
  document.getElementById('lb-task').textContent  = vid.augmentation ? `${vid.task} · ${vid.augmentation}` : vid.task || '';

  const info = document.getElementById('lb-info');
  info.innerHTML = `
    File: <span style="color:var(--text)">${vid.file}</span><br>
    Type: <span style="color:var(--text)">${vid.type}</span><br>
    Group: <span style="color:var(--text)">${vid.group}</span><br>
    Item: <span style="color:var(--text)">${lbIndex + 1} / ${allVideos.length}</span>
  `;

  // Restore tags + notes
  const state = getFileTags(vid.file);
  document.getElementById('lb-notes').value = state.notes || '';
  document.querySelectorAll('#lb-tag-row .lb-tag-btn').forEach(btn => {
    btn.classList.toggle('active-tag', state.tags.includes(btn.dataset.tag));
    btn.onclick = () => lbToggleTag(vid.file, btn.dataset.tag, btn);
  });

  // Scrubber
  const scr = document.getElementById('lb-scrubber');
  let scrDrag = false;
  scr.value = 0;

  clearInterval(window._lbTimer);
  window._lbTimer = setInterval(() => {
    if (!lbVid.duration) return;
    document.getElementById('lb-cur').textContent = fmtT(lbVid.currentTime);
    document.getElementById('lb-dur').textContent = fmtT(lbVid.duration);
    if (!scrDrag) { scr.max = lbVid.duration; scr.value = lbVid.currentTime; }
  }, 150);

  scr.onmousedown = () => { scrDrag = true; };
  scr.onmouseup = () => { lbVid.currentTime = parseFloat(scr.value); scrDrag = false; };
  scr.onchange  = () => { lbVid.currentTime = parseFloat(scr.value); scrDrag = false; };

  lbVid.onplay  = () => { document.getElementById('lb-play-btn').textContent = '⏸'; };
  lbVid.onpause = () => { document.getElementById('lb-play-btn').textContent = '▶'; };
}

function saveLbState() {
  const vid = allVideos[lbIndex];
  if (!vid) return;
  const state = getFileTags(vid.file);
  state.notes = document.getElementById('lb-notes').value;
  userTags[vid.file] = state;
  localStorage.setItem(TAGS_KEY, JSON.stringify(userTags));
}

function lbToggleTag(file, tag, btn) {
  const state = getFileTags(file);
  const idx = state.tags.indexOf(tag);
  if (idx >= 0) { state.tags.splice(idx, 1); btn.classList.remove('active-tag'); }
  else          { state.tags.push(tag);       btn.classList.add('active-tag'); }
  userTags[file] = state;
  localStorage.setItem(TAGS_KEY, JSON.stringify(userTags));
  showToast(`Tag "${tag}" ${idx>=0?'removed':'added'}`);
  renderGallery();
}

function lbTogglePlay() {
  const v = document.getElementById('lb-video');
  v.paused ? v.play() : v.pause();
}
function lbSetSpeed(s) {
  lbSpeed = s;
  document.getElementById('lb-video').playbackRate = s;
  document.querySelectorAll('.lb-speed').forEach((b,i) => b.classList.toggle('active', [0.5,1,2][i]===s));
}
let lbMuted = true;
function lbSetMuted() {
  lbMuted = !lbMuted;
  document.getElementById('lb-video').muted = lbMuted;
}

// ── CSV export ──
function exportTagsCSV() {
  const rows = allVideos.map(v => {
    const state = getFileTags(v.file);
    return [v.file, v.label, v.type, v.group, v.task || '', state.tags.join('|'), state.notes || ''];
  });
  const header = ['file','label','type','group','task','tags','notes'];
  const csv = [header.join(','), ...rows.map(r => r.map(c => JSON.stringify(c)).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'dataaug-tags.csv' });
  a.click(); URL.revokeObjectURL(a.href);
  showToast(`Exported ${rows.length} items`);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('open')) {
    switch (e.key) {
      case 'Escape': closeLightbox(); break;
      case 'ArrowLeft':  e.preventDefault(); lbNav(-1); break;
      case 'ArrowRight': e.preventDefault(); lbNav(1); break;
      case ' ': e.preventDefault(); lbTogglePlay(); break;
    }
  }
});

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Init ──
renderGallery();
</script>
</body>
</html>

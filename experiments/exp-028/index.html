<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatasetStats — Robot Dataset Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#252525;--fg:#e5e5e7;--dim:#86868b;
  --accent:#2997ff;--green:#30d158;--red:#ff453a;--yellow:#ffd60a;--purple:#bf5af2;--orange:#ff9f0a}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh}
header{padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
header h1 span{color:var(--accent)}

.container{max-width:1100px;margin:0 auto;padding:24px}

/* Input */
.input-section{margin-bottom:24px}
textarea{width:100%;padding:14px;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:10px;font-size:.82rem;font-family:'SF Mono',Monaco,monospace;line-height:1.5;resize:vertical;min-height:100px}
textarea:focus{border-color:var(--accent);outline:none}
.input-actions{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 16px;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#1a8aef}

/* Stats Overview */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat-card{padding:16px;border-radius:10px;background:var(--card);border:1px solid var(--border);text-align:center}
.stat-value{font-size:1.6rem;font-weight:700;font-variant-numeric:tabular-nums}
.stat-label{font-size:.72rem;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* Charts Grid */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-panel.full{grid-column:1/-1}
.chart-title{font-size:.82rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-container{position:relative;height:260px}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:.8rem}
.data-table th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--dim);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.data-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar-mini{height:6px;border-radius:3px;min-width:2px}

.hidden{display:none}

@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>📊 <span>DatasetStats</span></h1>
  <span style="font-size:.78rem;color:var(--dim)">Robot Dataset Analytics Dashboard</span>
</header>

<div class="container">
  <div class="input-section">
    <textarea id="dataInput" placeholder='Paste JSON dataset metadata, or click "Load Demo" for a sample...'></textarea>
    <div class="input-actions">
      <button class="btn btn-primary" onclick="analyzeData()">📊 Analyze</button>
      <button class="btn" onclick="loadDemo()">Load Demo Dataset</button>
      <button class="btn" onclick="document.getElementById('dataInput').value='';document.getElementById('dashboard').classList.add('hidden')">Clear</button>
    </div>
  </div>
  
  <div id="dashboard" class="hidden">
    <div class="stats-row" id="statsRow"></div>
    <div class="charts-grid" id="chartsGrid"></div>
    <div class="chart-panel full" id="tablePanel" style="display:none">
      <div class="chart-title">📋 Task Breakdown</div>
      <table class="data-table" id="taskTable">
        <thead><tr><th>Task</th><th>Episodes</th><th>Success Rate</th><th>Avg Duration</th><th>Distribution</th></tr></thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
Chart.defaults.color = '#86868b';
Chart.defaults.borderColor = '#252525';
Chart.defaults.font.family = "-apple-system,sans-serif";
Chart.defaults.font.size = 11;

const COLORS = ['#2997ff','#30d158','#bf5af2','#ff9f0a','#ff453a','#ffd60a','#5ac8fa','#ff6b6b','#1abc9c','#e74c3c'];

let charts = {};

function loadDemo() {
  const demo = {
    name: "pick-place-cosmos-v3",
    description: "WidowX 250s manipulation dataset with Cosmos augmentations",
    total_episodes: 2400,
    total_frames: 720000,
    fps: 30,
    cameras: ["cam_high", "cam_low", "cam_wrist"],
    resolution: "640x480",
    robot: "WidowX 250s",
    gripper: "Dynamixel XL430",
    tasks: [
      { name: "pick_red_cube", episodes: 450, success_rate: 0.89, avg_duration_s: 12.3, augmented: 300 },
      { name: "place_on_plate", episodes: 380, success_rate: 0.82, avg_duration_s: 15.1, augmented: 250 },
      { name: "stack_blocks", episodes: 320, success_rate: 0.71, avg_duration_s: 22.8, augmented: 200 },
      { name: "push_to_target", episodes: 290, success_rate: 0.93, avg_duration_s: 8.5, augmented: 190 },
      { name: "pick_and_insert", episodes: 260, success_rate: 0.65, avg_duration_s: 18.7, augmented: 170 },
      { name: "sweep_debris", episodes: 220, success_rate: 0.78, avg_duration_s: 14.2, augmented: 140 },
      { name: "close_drawer", episodes: 180, success_rate: 0.91, avg_duration_s: 6.8, augmented: 120 },
      { name: "flip_object", episodes: 150, success_rate: 0.58, avg_duration_s: 11.4, augmented: 100 },
      { name: "pour_liquid", episodes: 100, success_rate: 0.45, avg_duration_s: 25.3, augmented: 60 },
      { name: "bimanual_handoff", episodes: 50, success_rate: 0.42, avg_duration_s: 30.1, augmented: 30 }
    ],
    collection_dates: ["2026-01-15", "2026-02-01", "2026-02-15", "2026-03-01", "2026-03-10"],
    episodes_per_date: [300, 500, 600, 550, 450],
    storage_gb: 145.6
  };
  document.getElementById('dataInput').value = JSON.stringify(demo, null, 2);
}

function analyzeData() {
  let data;
  try { data = JSON.parse(document.getElementById('dataInput').value); }
  catch(e) { alert('Invalid JSON: ' + e.message); return; }
  
  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  
  document.getElementById('dashboard').classList.remove('hidden');
  
  // Compute stats
  const tasks = data.tasks || [];
  const totalEps = data.total_episodes || tasks.reduce((s,t) => s + t.episodes, 0);
  const totalFrames = data.total_frames || totalEps * 300;
  const avgSuccessRate = tasks.length ? tasks.reduce((s,t) => s + t.success_rate * t.episodes, 0) / totalEps : 0;
  const totalAugmented = tasks.reduce((s,t) => s + (t.augmented || 0), 0);
  const cameras = data.cameras || [];
  const storageGB = data.storage_gb || (totalFrames * 640 * 480 * 3 / 1e9 * 0.3);
  
  // Stats row
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${totalEps.toLocaleString()}</div><div class="stat-label">Total Episodes</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--purple)">${totalFrames.toLocaleString()}</div><div class="stat-label">Total Frames</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${(avgSuccessRate*100).toFixed(1)}%</div><div class="stat-label">Avg Success Rate</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--orange)">${tasks.length}</div><div class="stat-label">Unique Tasks</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--yellow)">${cameras.length || '—'}</div><div class="stat-label">Cameras</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--red)">${storageGB.toFixed(1)} GB</div><div class="stat-label">Storage</div></div>
  `;
  
  // Charts
  const grid = document.getElementById('chartsGrid');
  grid.innerHTML = `
    <div class="chart-panel"><div class="chart-title">🥧 Task Distribution</div><div class="chart-container"><canvas id="chartPie"></canvas></div></div>
    <div class="chart-panel"><div class="chart-title">✅ Success Rate by Task</div><div class="chart-container"><canvas id="chartSuccess"></canvas></div></div>
    <div class="chart-panel"><div class="chart-title">⏱ Episode Duration (seconds)</div><div class="chart-container"><canvas id="chartDuration"></canvas></div></div>
    <div class="chart-panel"><div class="chart-title">🔄 Real vs Augmented Episodes</div><div class="chart-container"><canvas id="chartAug"></canvas></div></div>
    ${data.collection_dates ? '<div class="chart-panel full"><div class="chart-title">📈 Collection Timeline</div><div class="chart-container"><canvas id="chartTimeline"></canvas></div></div>' : ''}
    ${cameras.length ? '<div class="chart-panel"><div class="chart-title">📷 Camera Coverage</div><div class="chart-container"><canvas id="chartCameras"></canvas></div></div>' : ''}
  `;
  
  // Pie chart - task distribution
  charts.pie = new Chart(document.getElementById('chartPie'), {
    type: 'doughnut',
    data: {
      labels: tasks.map(t => t.name.replace(/_/g,' ')),
      datasets: [{ data: tasks.map(t => t.episodes), backgroundColor: COLORS.slice(0, tasks.length), borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { boxWidth: 10, padding: 8, font: { size: 10 } } } },
      cutout: '55%'
    }
  });
  
  // Success rate bar chart
  charts.success = new Chart(document.getElementById('chartSuccess'), {
    type: 'bar',
    data: {
      labels: tasks.map(t => t.name.replace(/_/g,' ')),
      datasets: [{
        data: tasks.map(t => t.success_rate * 100),
        backgroundColor: tasks.map(t => t.success_rate > 0.8 ? '#30d158' : t.success_rate > 0.6 ? '#ffd60a' : '#ff453a'),
        borderRadius: 4, barPercentage: 0.7
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxRotation: 45, font: { size: 9 } } },
        y: { min: 0, max: 100, title: { display: true, text: '%' } }
      }
    }
  });
  
  // Duration histogram
  charts.duration = new Chart(document.getElementById('chartDuration'), {
    type: 'bar',
    data: {
      labels: tasks.map(t => t.name.replace(/_/g,' ')),
      datasets: [{
        data: tasks.map(t => t.avg_duration_s),
        backgroundColor: COLORS.slice(0, tasks.length).map(c => c + '88'),
        borderColor: COLORS.slice(0, tasks.length),
        borderWidth: 1, borderRadius: 4, barPercentage: 0.7
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxRotation: 45, font: { size: 9 } } },
        y: { title: { display: true, text: 'seconds' } }
      }
    }
  });
  
  // Augmented vs Real
  charts.aug = new Chart(document.getElementById('chartAug'), {
    type: 'bar',
    data: {
      labels: tasks.map(t => t.name.replace(/_/g,' ')),
      datasets: [
        { label: 'Real', data: tasks.map(t => t.episodes - (t.augmented||0)), backgroundColor: '#2997ff88', borderColor: '#2997ff', borderWidth: 1, borderRadius: 4 },
        { label: 'Augmented', data: tasks.map(t => t.augmented||0), backgroundColor: '#bf5af288', borderColor: '#bf5af2', borderWidth: 1, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { boxWidth: 10 } } },
      scales: {
        x: { stacked: true, ticks: { maxRotation: 45, font: { size: 9 } } },
        y: { stacked: true, title: { display: true, text: 'episodes' } }
      }
    }
  });
  
  // Timeline
  if(data.collection_dates) {
    charts.timeline = new Chart(document.getElementById('chartTimeline'), {
      type: 'line',
      data: {
        labels: data.collection_dates,
        datasets: [{
          label: 'Episodes Collected',
          data: data.episodes_per_date,
          borderColor: '#2997ff', backgroundColor: 'rgba(41,151,255,.1)',
          fill: true, tension: .3, pointRadius: 5, pointBackgroundColor: '#2997ff', borderWidth: 2
        }, {
          label: 'Cumulative',
          data: data.episodes_per_date.reduce((acc, v) => { acc.push((acc.length ? acc[acc.length-1] : 0) + v); return acc; }, []),
          borderColor: '#30d158', backgroundColor: 'transparent',
          tension: .3, pointRadius: 3, borderWidth: 1.5, borderDash: [4, 4],
          yAxisID: 'y1'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { boxWidth: 10 } } },
        scales: {
          y: { title: { display: true, text: 'Per batch' }, position: 'left' },
          y1: { title: { display: true, text: 'Cumulative' }, position: 'right', grid: { drawOnChartArea: false } }
        }
      }
    });
  }
  
  // Cameras
  if(cameras.length) {
    charts.cameras = new Chart(document.getElementById('chartCameras'), {
      type: 'polarArea',
      data: {
        labels: cameras,
        datasets: [{ data: cameras.map(() => totalEps), backgroundColor: COLORS.slice(0, cameras.length).map(c => c + '66'), borderWidth: 1, borderColor: COLORS.slice(0, cameras.length) }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { boxWidth: 10, padding: 8 } } }
      }
    });
  }
  
  // Table
  const tablePanel = document.getElementById('tablePanel');
  tablePanel.style.display = 'block';
  const tbody = document.getElementById('taskTableBody');
  const maxEps = Math.max(...tasks.map(t => t.episodes));
  tbody.innerHTML = tasks.map((t, i) => {
    const sr = t.success_rate * 100;
    const srColor = sr > 80 ? 'var(--green)' : sr > 60 ? 'var(--yellow)' : 'var(--red)';
    return `<tr>
      <td><strong>${t.name.replace(/_/g,' ')}</strong></td>
      <td>${t.episodes}</td>
      <td style="color:${srColor}">${sr.toFixed(1)}%</td>
      <td>${t.avg_duration_s?.toFixed(1) || '—'}s</td>
      <td><div class="bar-cell"><div class="bar-mini" style="width:${t.episodes/maxEps*100}%;background:${COLORS[i%COLORS.length]}"></div><span style="font-size:.72rem;color:var(--dim)">${(t.episodes/totalEps*100).toFixed(1)}%</span></div></td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
